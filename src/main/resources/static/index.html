<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Auth Lab</title>
    <style>
      :root {
        --bg: #f3f4f6;
        --card: #ffffff;
        --card-2: #fafafa;
        --line: #d4d4d8;
        --text: #111111;
        --muted: #52525b;
        --accent: #2563eb;
        --danger: #b91c1c;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: var(--bg);
        color: var(--text);
        font-family: "Segoe UI", Arial, sans-serif;
        padding: 18px;
      }

      .shell {
        width: min(560px, 100%);
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 14px;
        box-shadow: 0 6px 16px rgba(0, 0, 0, 0.08);
        overflow: hidden;
      }

      .head {
        padding: 22px 26px 12px;
      }

      .eyebrow {
        font-size: 0.78rem;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        color: var(--accent);
        font-weight: 700;
      }

      h1 {
        margin: 12px 0 6px;
        font-size: clamp(1.8rem, 2.8vw, 2.35rem);
      }

      .sub {
        margin: 0;
        color: var(--muted);
      }

      .panel {
        padding: 16px 26px 26px;
      }

      .hidden {
        display: none;
      }

      .oauth-btn,
      .primary-btn,
      .ghost-btn {
        width: 100%;
        border-radius: 10px;
        padding: 14px 16px;
        font-size: 1rem;
        border: 1px solid var(--line);
        cursor: pointer;
      }

      .oauth-btn {
        background: #ffffff;
        color: #111111;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        font-weight: 700;
      }

      .primary-btn {
        margin-top: 18px;
        background: #111111;
        border-color: #111111;
        color: #ffffff;
        font-weight: 800;
      }

      .ghost-btn {
        background: #ffffff;
        color: #111111;
      }

      .divider {
        display: flex;
        align-items: center;
        gap: 10px;
        margin: 18px 0 14px;
        color: #6b7280;
        letter-spacing: 0.12em;
        font-size: 0.74rem;
      }

      .divider::before,
      .divider::after {
        content: "";
        height: 1px;
        flex: 1;
        background: var(--line);
      }

      label {
        display: block;
        margin: 12px 0 6px;
        color: #374151;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        font-size: 0.74rem;
      }

      input {
        width: 100%;
        border: 1px solid var(--line);
        background: #ffffff;
        color: #111111;
        border-radius: 10px;
        padding: 13px 14px;
        font-size: 1rem;
      }

      .switch-line {
        margin-top: 16px;
        text-align: center;
        color: var(--muted);
      }

      .link-btn {
        background: none;
        border: 0;
        color: var(--accent);
        cursor: pointer;
        font-weight: 700;
        padding: 0;
      }

      .status {
        margin: 0;
        border-top: 1px solid var(--line);
        padding: 12px 16px;
        white-space: pre-wrap;
        font-size: 0.84rem;
        color: #374151;
        background: #f9fafb;
      }

      .status.ok {
        color: #166534;
        background: #f0fdf4;
      }

      .status.err {
        color: #b91c1c;
        background: #fef2f2;
      }

      .account {
        margin-top: 12px;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: var(--card-2);
        padding: 14px;
      }

      .account div {
        margin: 6px 0;
      }

      .mono {
        font-family: Consolas, monospace;
        font-size: 0.83rem;
        word-break: break-all;
      }

      .row {
        margin-top: 12px;
        display: flex;
        gap: 10px;
      }

      .row > button {
        flex: 1;
      }

      .danger {
        background: #ffffff;
        border: 1px solid #fca5a5;
        color: var(--danger);
      }

      @media (max-width: 520px) {
        .head,
        .panel {
          padding-left: 18px;
          padding-right: 18px;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="head">
        <div class="eyebrow" id="formLabel">Login</div>
        <h1 id="formTitle">Welcome Back</h1>
        <p class="sub" id="formDesc">Sign in with Google or continue with email.</p>
      </section>

      <section id="authView" class="panel">
        <section id="loginPanel">
          <button id="googleLoginBtn" class="oauth-btn" type="button">
            <span aria-hidden="true">G</span>
            <span>Login with Google</span>
          </button>

          <div class="divider">or continue with email</div>

          <label for="loginIdentifier">Email</label>
          <input id="loginIdentifier" placeholder="you@example.com" />

          <label for="loginPassword">Password</label>
          <input id="loginPassword" type="password" placeholder="********" />

          <button id="loginBtn" class="primary-btn" type="button">Sign In</button>

          <div class="switch-line">
            Don't have an account?
            <button id="toRegisterBtn" class="link-btn" type="button">Register</button>
          </div>
        </section>

        <section id="registerPanel" class="hidden">
          <label for="registerEmail">Email</label>
          <input id="registerEmail" placeholder="new@example.com" />

          <label for="registerPassword">Password</label>
          <input id="registerPassword" type="password" placeholder="minimum 8 characters" />

          <label for="registerUsername">Username (optional)</label>
          <input id="registerUsername" placeholder="newuser" />

          <label for="registerDisplayName">Display Name (optional)</label>
          <input id="registerDisplayName" placeholder="New User" />

          <button id="registerBtn" class="primary-btn" type="button">Create Account</button>

          <div class="switch-line">
            Already have an account?
            <button id="toLoginBtn" class="link-btn" type="button">Login</button>
          </div>
        </section>
      </section>

      <section id="accountView" class="panel hidden">
        <div class="eyebrow">Signed In</div>
        <h1 style="font-size:1.7rem; margin:10px 0 0;">Your Account</h1>
        <p class="sub">Session is active. You can refresh profile or logout.</p>

        <div id="profileBox" class="account"></div>

        <div class="row">
          <button id="refreshMeBtn" class="ghost-btn" type="button">Refresh</button>
          <button id="logoutBtn" class="ghost-btn danger" type="button">Logout</button>
        </div>
      </section>

      <pre id="status" class="status">Ready.</pre>
    </main>

    <script>
      const TOKEN_KEY = "authLabToken";
      const statusEl = document.getElementById("status");
      const authView = document.getElementById("authView");
      const accountView = document.getElementById("accountView");
      const loginPanel = document.getElementById("loginPanel");
      const registerPanel = document.getElementById("registerPanel");
      const profileBox = document.getElementById("profileBox");
      const registerBtn = document.getElementById("registerBtn");
      const formLabel = document.getElementById("formLabel");
      const formTitle = document.getElementById("formTitle");
      const formDesc = document.getElementById("formDesc");
      let registerInFlight = false;

      function setStatus(value, kind) {
        statusEl.className = "status";
        if (kind === "ok") {
          statusEl.classList.add("ok");
        } else if (kind === "err") {
          statusEl.classList.add("err");
        }
        statusEl.textContent = typeof value === "string"
          ? value
          : JSON.stringify(value, null, 2);
      }

      function getToken() {
        return localStorage.getItem(TOKEN_KEY) || "";
      }

      function setToken(token) {
        if (token) {
          localStorage.setItem(TOKEN_KEY, token);
        } else {
          localStorage.removeItem(TOKEN_KEY);
        }
      }

      function setAuthMode(mode) {
        if (mode === "register") {
          loginPanel.classList.add("hidden");
          registerPanel.classList.remove("hidden");
          formLabel.textContent = "Register";
          formTitle.textContent = "Create Account";
          formDesc.textContent = "Register with email or use Google OAuth login.";
          return;
        }

        registerPanel.classList.add("hidden");
        loginPanel.classList.remove("hidden");
        formLabel.textContent = "Login";
        formTitle.textContent = "Welcome Back";
        formDesc.textContent = "Sign in with Google or continue with email.";
      }

      function showAuthView() {
        authView.classList.remove("hidden");
        accountView.classList.add("hidden");
      }

      function showAccountView() {
        authView.classList.add("hidden");
        accountView.classList.remove("hidden");
      }

      async function callApi(path, method, body, withAuth) {
        const requestUrl = new URL(path, window.location.origin).toString();
        const headers = { "Content-Type": "application/json" };

        if (withAuth) {
          const token = getToken();
          if (!token) {
            throw new Error("No token. Please login first.");
          }
          headers.Authorization = `Bearer ${token}`;
        }

        let response;
        try {
          response = await fetch(requestUrl, {
            method,
            headers,
            body: body ? JSON.stringify(body) : undefined,
            cache: "no-store",
          });
        } catch (error) {
          const detail = error instanceof Error ? error.message : String(error);
          throw new Error(`Failed to fetch ${requestUrl} (${method}): ${detail}`);
        }

        const rawPayload = await response.text();
        let payload = rawPayload;
        if (rawPayload) {
          try {
            payload = JSON.parse(rawPayload);
          } catch (_) {
            payload = rawPayload;
          }
        }

        return {
          ok: response.ok,
          status: response.status,
          payload,
          method,
          path: requestUrl,
        };
      }

      function saveTokenFromPayload(payload) {
        if (!payload || typeof payload !== "object") {
          return false;
        }

        const token = payload.accessToken || payload.access_token;
        if (token) {
          setToken(token);
          return true;
        }
        return false;
      }

      function renderProfile(mePayload) {
        const profile = mePayload && mePayload.profile ? mePayload.profile : null;
        if (!profile) {
          profileBox.innerHTML = "<div>Profile not found in response.</div>";
          return;
        }

        profileBox.innerHTML = `
          <div><strong>User ID:</strong> <span class="mono">${profile.supabaseUserId || "-"}</span></div>
          <div><strong>Email:</strong> ${profile.email || "-"}</div>
          <div><strong>Username:</strong> ${profile.username || "-"}</div>
          <div><strong>Display Name:</strong> ${profile.displayName || "-"}</div>
          <div><strong>Role:</strong> ${profile.role || "-"}</div>
          <div><strong>Active:</strong> ${String(profile.isActive)}</div>
        `;
      }

      async function refreshMe() {
        try {
          const result = await callApi("/api/auth/me", "GET", null, true);
          if (!result.ok) {
            setStatus(result, "err");
            showAuthView();
            return;
          }

          setStatus("Fetch account successful.", "ok");
          renderProfile(result.payload);
          showAccountView();
        } catch (error) {
          setStatus({ error: error.message }, "err");
          showAuthView();
        }
      }

      async function startGoogleOAuth() {
        try {
          const redirectTo = `${window.location.origin}${window.location.pathname}`;
          const endpoint = `/api/auth/sso/google/url?redirectTo=${encodeURIComponent(redirectTo)}`;
          const result = await callApi(endpoint, "GET", null, false);

          if (!result.ok) {
            setStatus(result, "err");
            return;
          }

          const url = result.payload.url;
          if (!url) {
            setStatus({ error: "Missing Google OAuth URL" }, "err");
            return;
          }

          setStatus("Redirecting to Google OAuth...", "ok");
          window.location.href = url;
        } catch (error) {
          setStatus({ error: error.message }, "err");
        }
      }

      async function processGoogleCallbackIfPresent() {
        const params = new URLSearchParams(window.location.search);
        const code = params.get("code");
        const state = params.get("state");

        if (!code || !state) {
          return false;
        }

        try {
          setStatus("Processing Google OAuth callback...", "ok");
          const result = await callApi(
            "/api/auth/sso/google/callback",
            "POST",
            { code, state },
            false
          );

          if (!result.ok) {
            setStatus(result, "err");
            return true;
          }

          setStatus(result.payload.message || "Google login successful.", "ok");
          if (saveTokenFromPayload(result.payload)) {
            await refreshMe();
          }
          return true;
        } catch (error) {
          setStatus({ error: error.message }, "err");
          return true;
        } finally {
          window.history.replaceState({}, document.title, window.location.pathname);
        }
      }

      document.getElementById("toRegisterBtn").addEventListener("click", () => {
        setAuthMode("register");
      });

      document.getElementById("toLoginBtn").addEventListener("click", () => {
        setAuthMode("login");
      });

      document.getElementById("googleLoginBtn").addEventListener("click", startGoogleOAuth);

      document.getElementById("loginBtn").addEventListener("click", async () => {
        setStatus("Submitting login request...", "ok");
        try {
          const result = await callApi(
            "/api/auth/login",
            "POST",
            {
              identifier: document.getElementById("loginIdentifier").value,
              password: document.getElementById("loginPassword").value,
            },
            false
          );

          if (!result.ok) {
            setStatus(result, "err");
            return;
          }

          setStatus(result.payload.message || "Login successful.", "ok");
          if (saveTokenFromPayload(result.payload)) {
            await refreshMe();
          }
        } catch (error) {
          setStatus({ error: error.message }, "err");
        }
      });

      document.getElementById("registerBtn").addEventListener("click", async () => {
        if (registerInFlight) {
          return;
        }
        registerInFlight = true;
        registerBtn.disabled = true;
        setStatus("Submitting registration request...", "ok");

        try {
          const body = {
            email: document.getElementById("registerEmail").value,
            password: document.getElementById("registerPassword").value,
          };

          const username = document.getElementById("registerUsername").value.trim();
          const displayName = document.getElementById("registerDisplayName").value.trim();

          if (username) {
            body.username = username;
          }
          if (displayName) {
            body.displayName = displayName;
          }

          const result = await callApi("/api/auth/register", "POST", body, false);
          if (!result.ok) {
            setStatus(result, "err");
            return;
          }

          setStatus(result.payload.message || "Registration successful.", "ok");
          if (saveTokenFromPayload(result.payload)) {
            await refreshMe();
          }
        } catch (error) {
          setStatus({ error: error.message }, "err");
        } finally {
          registerInFlight = false;
          registerBtn.disabled = false;
        }
      });

      document.getElementById("refreshMeBtn").addEventListener("click", refreshMe);

      document.getElementById("logoutBtn").addEventListener("click", () => {
        setToken("");
        setStatus("Logout successful.", "ok");
        showAuthView();
        setAuthMode("login");
      });

      (async () => {
        const handledGoogleCallback = await processGoogleCallbackIfPresent();
        if (handledGoogleCallback) {
          return;
        }

        if (getToken()) {
          await refreshMe();
          return;
        }

        showAuthView();
        setAuthMode("login");
      })();
    </script>
  </body>
</html>
