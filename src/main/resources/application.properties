spring.application.name=auth

# PostgreSQL datasource (values come from environment variables).
# Override the full URL via JDBC_DATABASE_URL if needed.
spring.datasource.url=${JDBC_DATABASE_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:authdb}}
spring.datasource.username=${DB_USER:authuser}
spring.datasource.password=${DB_PASSWORD:authpass}

# JPA / Hibernate (dev settings)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

server.port=8080

# Use a reasonable default for date serialization
spring.jackson.serialization.write-dates-as-timestamps=false
