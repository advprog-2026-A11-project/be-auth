spring.application.name=auth

# Load dotenv-style files when running locally.
spring.config.import=optional:file:.env[.properties],optional:file:.env.local[.properties]

# Supabase/PostgreSQL datasource.
# Preferred: set JDBC_DATABASE_URL directly from Supabase dashboard.
# Fallback uses direct Supabase host and database.
spring.datasource.url=${JDBC_DATABASE_URL:jdbc:postgresql://db.ubsiynttkoqzdcxpxzbg.supabase.co:5432/postgres?sslmode=require}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate (dev settings)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

server.port=${SERVER_PORT:8081}

# Use a reasonable default for date serialization
spring.jackson.serialization.write-dates-as-timestamps=false

# expose health
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Supabase Auth JWT validation
supabase.url=${SUPABASE_URL:}
supabase.anon-key=${SUPABASE_ANON_KEY:}
supabase.jwt.issuer=${SUPABASE_JWT_ISSUER:}
supabase.jwt.audience=${SUPABASE_JWT_AUDIENCE:authenticated}
supabase.jwks-url=${SUPABASE_JWKS_URL:}
