spring.application.name=auth

# Load dotenv-style files when running locally.
spring.config.import=optional:file:.env[.properties],optional:file:.env.local[.properties]

# Supabase/PostgreSQL datasource.
# Preferred: set JDBC_DATABASE_URL from Supabase Session Pooler.
# Fallback composes URL from DB_HOST/DB_PORT/DB_NAME.
spring.datasource.url=${JDBC_DATABASE_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:postgres}?sslmode=require}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate (dev settings)
spring.jpa.hibernate.ddl-auto=none
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.boot.allow_jdbc_metadata_access=false
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.datasource.hikari.connection-timeout=5000
spring.datasource.hikari.initialization-fail-timeout=1
spring.datasource.hikari.maximum-pool-size=${DB_MAX_POOL_SIZE:2}
spring.datasource.hikari.minimum-idle=${DB_MIN_IDLE:0}
spring.datasource.hikari.idle-timeout=${DB_IDLE_TIMEOUT_MS:30000}
spring.datasource.hikari.max-lifetime=${DB_MAX_LIFETIME_MS:600000}

server.port=${SERVER_PORT:8081}

# Use a reasonable default for date serialization
spring.jackson.serialization.write-dates-as-timestamps=false

# expose health
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Supabase Auth JWT validation
supabase.url=${SUPABASE_URL:}
# Prefer publishable key. Keep anon key fallback for backward compatibility.
supabase.api-key=${SUPABASE_PUBLISHABLE_KEY:${SUPABASE_ANON_KEY:}}
supabase.service-role-key=${SUPABASE_SERVICE_ROLE_KEY:}
supabase.anon-key=${SUPABASE_ANON_KEY:}
supabase.jwt.issuer=${SUPABASE_JWT_ISSUER:}
supabase.jwt.audience=${SUPABASE_JWT_AUDIENCE:authenticated}
supabase.jwks-url=${SUPABASE_JWKS_URL:}

# Google SSO callback configuration
auth.sso.google.redirect-url=${AUTH_GOOGLE_REDIRECT_URL:http://localhost:${server.port}/auth-lab.html}
auth.sso.state-ttl-seconds=${AUTH_SSO_STATE_TTL_SECONDS:600}
auth.password.enabled=${AUTH_PASSWORD_ENABLED:true}
# FRONTEND_URL supports comma-separated origins (example:
# FRONTEND_URL=http://localhost:3000,https://fe-yomu.vercel.app)
