name: CD (dummy)

on:
  workflow_run:
    workflows: ["sonarcloud.yml", "linter.yml", "scorecard.yml"]
    types: [completed]

permissions:
  contents: read
  checks: read
  actions: read

jobs:
  verify-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Verify quality workflows succeeded
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const workflows = ['sonarcloud.yml','linter.yml','scorecard.yml'];
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            for (const wfName of workflows) {
              try {
                const wf = await github.actions.getWorkflow({owner, repo, workflow_id: wfName});
                const runs = await github.actions.listWorkflowRuns({owner, repo, workflow_id: wf.data.id, per_page: 1});
                const latest = runs.data.workflow_runs[0];
                if (!latest) core.setFailed(`No runs found for ${wfName}`);
                if (latest.conclusion !== 'success') core.setFailed(`Latest run for ${wfName} concluded with ${latest.conclusion}`);
              } catch (err) {
                core.setFailed(`Error checking ${wfName}: ${err.message}`);
              }
            }
            core.info('All quality workflows passed.');

      - name: Dummy deployment
        if: success()
        run: |
          echo "Quality checks passed — performing dummy deployment"
          echo "DEPLOYMENT: dummy deploy step completed"
