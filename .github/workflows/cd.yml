name: CD - Guard and Deploy EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions: {}

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  guard:
    name: Guard (Build and Test)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false

      - name: Set up JDK 21
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@d9c87d481d55275bb5441eef3fe0e46805f9ef70

      - name: Grant execute permission
        run: chmod +x ./gradlew

      - name: Build and test guard
        run: ./gradlew clean build

  deploy:
    name: Deploy to AWS EC2
    runs-on: ubuntu-latest
    needs: guard
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 20
    environment: production
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          persist-credentials: false

      - name: Set up JDK 21
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@d9c87d481d55275bb5441eef3fe0e46805f9ef70

      - name: Grant execute permission
        run: chmod +x ./gradlew

      - name: Build deployable jar
        run: |
          ./gradlew clean bootJar -x test
          cp build/libs/*.jar build/libs/app.jar

      - name: Validate SSH key
        env:
          EC2_SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
        run: |
          test -n "$EC2_SSH_PRIVATE_KEY" || (echo "Missing secret: EC2_SSH_PRIVATE_KEY" && exit 1)

      - name: Configure AWS credentials via OIDC (optional)
        if: ${{ secrets.EC2_HOST == '' && vars.EC2_HOST == '' && vars.AWS_ACCOUNT_ID != '' && vars.AWS_REGION != '' }}
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502
        with:
          role-to-assume: ${{ format('arn:aws:iam::{0}:role/{1}', vars.AWS_ACCOUNT_ID, vars.AWS_ROLE_NAME || 'LabRole') }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Resolve EC2 host
        id: resolve_host
        env:
          EC2_HOST_SECRET: ${{ secrets.EC2_HOST }}
          EC2_HOST_VAR: ${{ vars.EC2_HOST }}
          EC2_INSTANCE_ID: ${{ vars.EC2_INSTANCE_ID }}
          EC2_INSTANCE_NAME: ${{ vars.EC2_INSTANCE_NAME }}
          AWS_REGION: ${{ vars.AWS_REGION }}
        run: |
          set -euo pipefail

          HOST="${EC2_HOST_SECRET:-${EC2_HOST_VAR:-}}"
          INSTANCE_NAME="${EC2_INSTANCE_NAME:-be-auth}"

          if [ -z "$HOST" ]; then
            if ! command -v aws >/dev/null 2>&1; then
              echo "AWS CLI not found and EC2_HOST is empty"
              exit 1
            fi

            if [ -z "${AWS_REGION:-}" ]; then
              echo "Missing vars.AWS_REGION when EC2_HOST is not set"
              exit 1
            fi

            if [ -n "${EC2_INSTANCE_ID:-}" ]; then
              HOST=$(aws ec2 describe-instances \
                --region "$AWS_REGION" \
                --instance-ids "$EC2_INSTANCE_ID" \
                --query 'Reservations[0].Instances[0].PublicDnsName' \
                --output text)

              if [ "$HOST" = "None" ] || [ -z "$HOST" ]; then
                HOST=$(aws ec2 describe-instances \
                  --region "$AWS_REGION" \
                  --instance-ids "$EC2_INSTANCE_ID" \
                  --query 'Reservations[0].Instances[0].PublicIpAddress' \
                  --output text)
              fi
            else
              HOST=$(aws ec2 describe-instances \
                --region "$AWS_REGION" \
                --filters "Name=instance-state-name,Values=running" "Name=tag:Name,Values=$INSTANCE_NAME" \
                --query 'Reservations[0].Instances[0].PublicDnsName' \
                --output text)

              if [ "$HOST" = "None" ] || [ -z "$HOST" ]; then
                HOST=$(aws ec2 describe-instances \
                  --region "$AWS_REGION" \
                  --filters "Name=instance-state-name,Values=running" "Name=tag:Name,Values=$INSTANCE_NAME" \
                  --query 'Reservations[0].Instances[0].PublicIpAddress' \
                  --output text)
              fi
            fi
          fi

          if [ -z "$HOST" ] || [ "$HOST" = "None" ]; then
            echo "Cannot resolve EC2 host. Set secret EC2_HOST or vars.EC2_INSTANCE_ID/EC2_INSTANCE_NAME."
            exit 1
          fi

          echo "host=$HOST" >> "$GITHUB_OUTPUT"
          echo "Resolved host: $HOST"

      - name: Setup SSH key
        env:
          EC2_SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s' "$EC2_SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Add EC2 host to known_hosts
        env:
          EC2_SSH_PORT: ${{ secrets.EC2_SSH_PORT }}
          EC2_HOST: ${{ steps.resolve_host.outputs.host }}
        run: |
          PORT="${EC2_SSH_PORT:-22}"
          ssh-keyscan -p "$PORT" -H "$EC2_HOST" >> ~/.ssh/known_hosts

      - name: Resolve SSH user
        id: resolve_user
        env:
          EC2_USER_SECRET: ${{ secrets.EC2_USER }}
          EC2_USER_VAR: ${{ vars.EC2_USER }}
          EC2_SSH_PORT: ${{ secrets.EC2_SSH_PORT }}
          EC2_HOST: ${{ steps.resolve_host.outputs.host }}
          EC2_SSH_USERS: ${{ vars.EC2_SSH_USERS }}
        run: |
          set -euo pipefail

          PORT="${EC2_SSH_PORT:-22}"
          USER_VALUE="${EC2_USER_SECRET:-${EC2_USER_VAR:-}}"

          if [ -n "$USER_VALUE" ]; then
            echo "user=$USER_VALUE" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CANDIDATES="${EC2_SSH_USERS:-ec2-user ubuntu}"
          for u in $CANDIDATES; do
            if ssh -p "$PORT" -o ConnectTimeout=7 "$u@$EC2_HOST" "echo ok" >/dev/null 2>&1; then
              echo "user=$u" >> "$GITHUB_OUTPUT"
              echo "Resolved SSH user: $u"
              exit 0
            fi
          done

          echo "Cannot resolve SSH user. Set secret EC2_USER or vars.EC2_USER."
          exit 1

      - name: Upload jar to EC2
        env:
          EC2_HOST: ${{ steps.resolve_host.outputs.host }}
          EC2_USER: ${{ steps.resolve_user.outputs.user }}
          EC2_SSH_PORT: ${{ secrets.EC2_SSH_PORT }}
          EC2_APP_DIR: ${{ vars.EC2_APP_DIR }}
        run: |
          PORT="${EC2_SSH_PORT:-22}"
          APP_DIR="${EC2_APP_DIR:-/home/$EC2_USER/be-auth}"
          ssh -p "$PORT" "$EC2_USER@$EC2_HOST" "mkdir -p '$APP_DIR'"
          scp -P "$PORT" build/libs/app.jar "$EC2_USER@$EC2_HOST:$APP_DIR/app.jar"

      - name: Upload app environment file (optional)
        if: ${{ secrets.APP_ENV_FILE != '' }}
        env:
          EC2_HOST: ${{ steps.resolve_host.outputs.host }}
          EC2_USER: ${{ steps.resolve_user.outputs.user }}
          EC2_SSH_PORT: ${{ secrets.EC2_SSH_PORT }}
          EC2_APP_DIR: ${{ vars.EC2_APP_DIR }}
          APP_ENV_FILE: ${{ secrets.APP_ENV_FILE }}
        run: |
          PORT="${EC2_SSH_PORT:-22}"
          APP_DIR="${EC2_APP_DIR:-/home/$EC2_USER/be-auth}"
          printf '%s' "$APP_ENV_FILE" | ssh -p "$PORT" "$EC2_USER@$EC2_HOST" "cat > '$APP_DIR/.env'"

      - name: Restart app on EC2
        env:
          EC2_HOST: ${{ steps.resolve_host.outputs.host }}
          EC2_USER: ${{ steps.resolve_user.outputs.user }}
          EC2_SSH_PORT: ${{ secrets.EC2_SSH_PORT }}
          EC2_APP_DIR: ${{ vars.EC2_APP_DIR }}
          SPRING_PROFILE: ${{ vars.SPRING_PROFILE }}
          APP_PORT: ${{ vars.APP_PORT }}
        run: |
          PORT_SSH="${EC2_SSH_PORT:-22}"
          APP_DIR="${EC2_APP_DIR:-/home/$EC2_USER/be-auth}"
          PROFILE="${SPRING_PROFILE:-prod}"
          PORT_APP="${APP_PORT:-8081}"

          ssh -p "$PORT_SSH" "$EC2_USER@$EC2_HOST" \
            "APP_DIR='$APP_DIR' PROFILE='$PROFILE' PORT_APP='$PORT_APP' bash -s" <<'EOF'
          set -euo pipefail

          cd "$APP_DIR"

          if [ -f .env ]; then
            set -a
            # shellcheck disable=SC1091
            . ./.env
            set +a
          fi

          if [ -f app.pid ] && kill -0 "$(cat app.pid)" 2>/dev/null; then
            kill "$(cat app.pid)"
            sleep 5
          fi

          nohup java -jar app.jar \
            --spring.profiles.active="$PROFILE" \
            --server.port="$PORT_APP" > app.log 2>&1 &
          echo $! > app.pid
          sleep 3

          if ! kill -0 "$(cat app.pid)" 2>/dev/null; then
            echo "Application failed to start"
            tail -n 200 app.log || true
            exit 1
          fi

          echo "Deploy success. PID=$(cat app.pid)"
          EOF

      - name: Health check (optional)
        if: ${{ vars.HEALTHCHECK_URL != '' }}
        env:
          HEALTHCHECK_URL: ${{ vars.HEALTHCHECK_URL }}
        run: |
          curl --fail --retry 5 --retry-delay 3 "$HEALTHCHECK_URL"
