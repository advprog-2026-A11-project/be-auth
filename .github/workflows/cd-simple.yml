name: Deploy Backend (Main)

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: be-auth-deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Setup Java 21
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9
        with:
          distribution: temurin
          java-version: "21"

      - name: Build bootJar
        run: |
          chmod +x ./gradlew
          ./gradlew clean bootJar -x test

      - name: Copy JAR to EC2
        uses: appleboy/scp-action@917f8b81dfc1ccd331fef9e2d61bdc6c8be94634
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY || secrets.EC2_SSH_KEY }}
          source: "build/libs/*.jar"
          target: "~/app"

      - name: Restart app on EC2
        uses: appleboy/ssh-action@7eaf76671a0d7eec5d98ee897acda4f968735a17
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY || secrets.EC2_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            mkdir -p ~/app
            cd ~/app

            # Optional: write runtime env file from GitHub secret.
            if [ -n "${{ secrets.APP_ENV_FILE }}" ]; then
              printf "%s\n" "${{ secrets.APP_ENV_FILE }}" > .env
            fi

            # Resolve jar location regardless of scp flattening.
            JAR_FILE="$(ls -t *.jar build/libs/*.jar 2>/dev/null | grep -v -- '-plain\.jar$' | head -n 1 || true)"
            if [ -z "$JAR_FILE" ]; then
              echo "No runnable jar found in ~/app or ~/app/build/libs"
              ls -la
              ls -la build/libs || true
              exit 1
            fi

            if [ -f app.pid ] && kill -0 "$(cat app.pid)" 2>/dev/null; then
              kill "$(cat app.pid)" || true
              sleep 2
            fi
            rm -f app.pid

            if [ -f .env ]; then
              set -a
              . ./.env
              set +a
            fi

            nohup java -jar "$JAR_FILE" > app.log 2>&1 &
            echo $! > app.pid

            # Health check on EC2 localhost.
            for i in {1..30}; do
              if curl --silent --fail "http://127.0.0.1:8081/actuator/health" >/dev/null; then
                echo "App is healthy"
                exit 0
              fi
              sleep 2
            done

            echo "App failed to become healthy"
            tail -n 120 app.log || true
            exit 1
