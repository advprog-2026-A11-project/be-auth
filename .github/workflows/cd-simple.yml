name: CD - Simple Deploy EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683

      - name: Setup Java 21
        uses: actions/setup-java@c5195efecf7bdfc987ee8bae7a71cb8b11521c00
        with:
          distribution: temurin
          java-version: "21"

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build project
        run: |
          ./gradlew clean bootJar -x test
          cp build/libs/*.jar build/libs/app.jar

      - name: Copy JAR to EC2
        uses: appleboy/scp-action@917f8b81dfc1ccd331fef9e2d61bdc6c8be94634
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY || secrets.EC2_SSH_KEY }}
          source: "build/libs/app.jar"
          target: "~/app"
          strip_components: 2
          overwrite: true

      - name: Restart application on EC2
        uses: appleboy/ssh-action@029f5b4aeeeb58fdfe1410a5d17f967dacf36262
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY || secrets.EC2_SSH_KEY }}
          script: |
            set -euo pipefail
            cd ~/app

            if ! command -v java >/dev/null 2>&1; then
              if command -v dnf >/dev/null 2>&1; then
                sudo dnf install -y java-21-amazon-corretto-headless
              elif command -v yum >/dev/null 2>&1; then
                sudo yum install -y java-21-amazon-corretto-headless
              elif command -v apt-get >/dev/null 2>&1; then
                sudo apt-get update -y
                sudo apt-get install -y openjdk-21-jre-headless
              else
                echo "Java not found and no supported package manager available"
                exit 1
              fi
            fi
            java -version

            if [ -f app.pid ]; then
              kill "$(cat app.pid)" || true
              rm app.pid
            fi

            JAR_PATH="app.jar"
            if [ ! -f "$JAR_PATH" ] && [ -f "build/libs/app.jar" ]; then
              JAR_PATH="build/libs/app.jar"
            fi
            if [ ! -f "$JAR_PATH" ]; then
              JAR_PATH="$(ls -1 *.jar 2>/dev/null | head -n 1 || true)"
            fi
            if [ -z "${JAR_PATH:-}" ] || [ ! -f "$JAR_PATH" ]; then
              echo "No jar found in ~/app"
              ls -la
              exit 1
            fi

            nohup java -jar "$JAR_PATH" > app.log 2>&1 &
            echo $! > app.pid

            sleep 3
            if ! kill -0 "$(cat app.pid)" 2>/dev/null; then
              echo "App failed to start"
              tail -n 200 app.log || true
              exit 1
            fi

      - name: Health check on EC2 (local loopback)
        uses: appleboy/ssh-action@029f5b4aeeeb58fdfe1410a5d17f967dacf36262
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY || secrets.EC2_SSH_KEY }}
          script: |
            set -euo pipefail
            curl --fail --connect-timeout 5 --max-time 10 "http://127.0.0.1:8081/actuator/health" || \
            curl --fail --connect-timeout 5 --max-time 10 "http://127.0.0.1:8081/" || \
            (echo "Healthcheck failed on EC2 localhost:8081" && exit 1)
