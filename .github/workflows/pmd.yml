name: PMD Code Analysis

on:
  push:
  pull_request:

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  pmd:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        # TODO: pin this action to a specific commit SHA to satisfy security scanners
        # e.g. uses: actions/checkout@<commit-sha>
        uses: actions/checkout@v4

      - name: Setup Java
        # TODO: pin this action to a specific commit SHA to satisfy security scanners
        # e.g. uses: actions/setup-java@<commit-sha>
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Run PMD
        run: ./gradlew pmdMain pmdTest

      - name: Publish PMD Results in PR
        # TODO: pin this third-party action to a specific commit SHA to satisfy security scanners
        # e.g. uses: jwgmeligmeyling/pmd-github-action@<commit-sha>
        uses: jwgmeligmeyling/pmd-github-action@v1
        with:
          path: build/reports/pmd
