services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-authuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-authpass}
      POSTGRES_DB: ${POSTGRES_DB:-authdb}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      # If your machine already uses 5432, change AUTH_DB_PORT (or set it in .env)
      - "${AUTH_DB_PORT:-5433}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  auth:
    build:
      context: .
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-authdb}
      DB_USER: ${POSTGRES_USER:-authuser}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-authpass}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    ports:
      # Avoid clashing with other microservices on 8080
      - "${AUTH_HTTP_PORT:-8081}:8080"

volumes:
  db_data:
